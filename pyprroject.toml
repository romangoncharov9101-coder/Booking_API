[project]
name = "booking-api"
description = "Booking API - production-grade FastAPI backend"
reuires-python = ">=3.12"

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP", "B", "C4", "SIM", "TCH", "ANN"]
ignore = ["ANN101", "ANN102", "ANN401"]

[tool.mypy]
python-version = "3.12"
strict = true
ignore_missing_imports = true

[tool.pytest.init_options]
asyncio_mode = "auto"
testpaths = ["app/tests"]
env = ["ENVIRONMENT=test"]

[tool.coverage.run]
source = ["app"]
omit = ["app/tests/*, "alembic/*"]